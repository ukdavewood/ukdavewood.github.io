<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 16px;
      color: #1a1a2e;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 28px;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    /* ADD FORM */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b7280;
    }

    .form-group.grow { flex: 1 1 200px; }

    input[type="text"], input[type="date"], select {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a2e;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus, input[type="date"]:focus, select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      background: #fff;
    }

    button.add-btn {
      align-self: flex-end;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #4f46e5; }
    button.add-btn:active { transform: scale(0.97); }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #6366f1; color: #6366f1; }
    .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

    .sort-select {
      margin-left: auto;
      border: 1.5px solid #e5e7eb;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #6b7280;
      background: #fff;
      cursor: pointer;
      outline: none;
    }

    /* TASK LIST */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow 0.15s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item.done { opacity: 0.5; }
    .task-item.done .task-name { text-decoration: line-through; color: #9ca3af; }

    /* Checkbox */
    .check-wrap { flex-shrink: 0; }

    .check-wrap input[type="checkbox"] { display: none; }

    .check-wrap label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      background: #fff;
    }

    .check-wrap input:checked + label {
      background: #6366f1;
      border-color: #6366f1;
    }

    .check-wrap label::after {
      content: '';
      display: none;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .check-wrap input:checked + label::after { display: block; }

    /* Task body */
    .task-body { flex: 1; min-width: 0; }

    .task-name {
      font-size: 0.97rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .task-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .badge-high   { background: #fee2e2; color: #dc2626; }
    .badge-medium { background: #fef3c7; color: #d97706; }
    .badge-low    { background: #d1fae5; color: #059669; }

    .task-date {
      font-size: 0.78rem;
      color: #9ca3af;
    }

    .task-date.overdue { color: #dc2626; font-weight: 600; }

    /* Delete */
    .del-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .del-btn:hover { color: #dc2626; background: #fee2e2; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: #6b7280;
      font-weight: 500;
    }

    .stats span b { color: #1a1a2e; }

    /* IMPORT/EXPORT */
    .io-bar {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .io-btn {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .io-btn:hover { border-color: #6366f1; color: #6366f1; background: #f5f3ff; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1a1a2e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Import modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      padding: 28px;
      width: 360px;
      max-width: 90vw;
    }

    .modal h2 { font-size: 1.1rem; margin-bottom: 8px; }

    .modal p { font-size: 0.88rem; color: #6b7280; margin-bottom: 18px; line-height: 1.5; }

    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    .modal-btns button {
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .btn-cancel { background: #f3f4f6; color: #6b7280; }
    .btn-cancel:hover { background: #e5e7eb; }
    .btn-replace { background: #dc2626; color: #fff; }
    .btn-replace:hover { background: #b91c1c; }
    .btn-merge { background: #6366f1; color: #fff; }
    .btn-merge:hover { background: #4f46e5; }
  </style>
</head>
<body>
<div class="container">
  <h1>✅ My Todos</h1>

  <!-- Add form -->
  <div class="card">
    <div class="form-row">
      <div class="form-group grow">
        <label for="task-name">Task</label>
        <input type="text" id="task-name" placeholder="What needs doing?" />
      </div>
      <div class="form-group">
        <label for="task-priority">Priority</label>
        <select id="task-priority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="form-group">
        <label for="task-date">Target Date</label>
        <input type="date" id="task-date" />
      </div>
      <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>
  </div>

  <!-- Import/Export bar -->
  <div class="io-bar">
    <button class="io-btn" onclick="exportTasks()">⬇️ Export</button>
    <button class="io-btn" onclick="triggerImport()">⬆️ Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImportFile(event)" />
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Filters + Sort -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" data-filter="high" onclick="setFilter('high', this)">🔴 High</button>
    <select class="sort-select" onchange="setSort(this.value)">
      <option value="created">Sort: Added</option>
      <option value="date">Sort: Date</option>
      <option value="priority">Sort: Priority</option>
    </select>
  </div>

  <!-- Task list -->
  <div class="task-list" id="task-list"></div>
</div>

<!-- Import modal -->
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <h2>Import Tasks</h2>
    <p id="import-msg">How would you like to import?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-merge" onclick="doImport('merge')">Merge</button>
      <button class="btn-replace" onclick="doImport('replace')">Replace All</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'my_todos_v1';
  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let filter = 'all';
  let sort = 'created';

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function addTask() {
    const nameEl = document.getElementById('task-name');
    const name = nameEl.value.trim();
    if (!name) { nameEl.focus(); return; }

    tasks.push({
      id: uid(),
      name,
      priority: document.getElementById('task-priority').value,
      date: document.getElementById('task-date').value,
      done: false,
      created: Date.now()
    });

    nameEl.value = '';
    document.getElementById('task-date').value = '';
    save();
    render();
    nameEl.focus();
  }

  document.getElementById('task-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function setSort(s) {
    sort = s;
    render();
  }

  const priorityOrder = { high: 0, medium: 1, low: 2 };

  function getSorted(list) {
    return [...list].sort((a, b) => {
      if (sort === 'priority') return priorityOrder[a.priority] - priorityOrder[b.priority];
      if (sort === 'date') {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return a.date.localeCompare(b.date);
      }
      return b.created - a.created;
    });
  }

  function isOverdue(dateStr) {
    if (!dateStr) return false;
    return dateStr < new Date().toISOString().slice(0, 10);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function render() {
    const list = document.getElementById('task-list');

    let visible = tasks;
    if (filter === 'active') visible = tasks.filter(t => !t.done);
    else if (filter === 'done') visible = tasks.filter(t => t.done);
    else if (filter === 'high') visible = tasks.filter(t => t.priority === 'high' && !t.done);

    visible = getSorted(visible);

    // Stats
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    document.getElementById('stats').innerHTML = total
      ? `<span><b>${total}</b> tasks</span><span><b>${done}</b> done</span><span><b>${total - done}</b> remaining</span>`
      : '';

    if (!visible.length) {
      list.innerHTML = `<div class="empty"><div class="icon">🗒️</div>No tasks here yet.</div>`;
      return;
    }

    list.innerHTML = visible.map(t => {
      const overdue = !t.done && isOverdue(t.date);
      return `
        <div class="task-item${t.done ? ' done' : ''}">
          <div class="check-wrap">
            <input type="checkbox" id="chk-${t.id}" ${t.done ? 'checked' : ''} onchange="toggleDone('${t.id}')">
            <label for="chk-${t.id}"></label>
          </div>
          <div class="task-body">
            <div class="task-name" title="${escHtml(t.name)}">${escHtml(t.name)}</div>
            <div class="task-meta">
              <span class="badge badge-${t.priority}">${t.priority}</span>
              ${t.date ? `<span class="task-date${overdue ? ' overdue' : ''}">${overdue ? '⚠️ ' : '📅 '}${formatDate(t.date)}</span>` : ''}
            </div>
          </div>
          <button class="del-btn" title="Delete" onclick="deleteTask('${t.id}')">✕</button>
        </div>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- Export ----
  function exportTasks() {
    if (!tasks.length) { showToast('Nothing to export yet.'); return; }
    const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `todos-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`Exported ${tasks.length} task${tasks.length > 1 ? 's' : ''}.`);
  }

  // ---- Import ----
  let pendingImport = null;

  function triggerImport() {
    document.getElementById('import-file').value = '';
    document.getElementById('import-file').click();
  }

  function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('Invalid format');
        // Basic validation
        const valid = data.every(t => t.id && t.name && t.priority !== undefined);
        if (!valid) throw new Error('Missing fields');
        pendingImport = data;
        const count = data.length;
        document.getElementById('import-msg').textContent =
          `Found ${count} task${count > 1 ? 's' : ''} in the file. Merge adds them alongside your current tasks. Replace All removes your current tasks first.`;
        document.getElementById('import-modal').classList.add('open');
      } catch {
        showToast('⚠️ Invalid file — could not import.');
      }
    };
    reader.readAsText(file);
  }

  function doImport(mode) {
    if (!pendingImport) return;
    if (mode === 'replace') {
      tasks = pendingImport;
    } else {
      // Merge: skip duplicates by id
      const existingIds = new Set(tasks.map(t => t.id));
      const newTasks = pendingImport.filter(t => !existingIds.has(t.id));
      tasks = [...tasks, ...newTasks];
      const skipped = pendingImport.length - newTasks.length;
      if (skipped) showToast(`Merged ${newTasks.length} new task${newTasks.length !== 1 ? 's' : ''}, skipped ${skipped} duplicate${skipped !== 1 ? 's' : ''}.`);
      else showToast(`Merged ${newTasks.length} task${newTasks.length !== 1 ? 's' : ''}.`);
    }
    if (mode === 'replace') showToast(`Replaced with ${tasks.length} task${tasks.length !== 1 ? 's' : ''}.`);
    pendingImport = null;
    closeModal();
    save();
    render();
  }

  function closeModal() {
    document.getElementById('import-modal').classList.remove('open');
    pendingImport = null;
  }

  // Close modal on overlay click
  document.getElementById('import-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ---- Toast ----
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  render();
</script>
</body>
</html>
